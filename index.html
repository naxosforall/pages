<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NAX</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }
    img.logo {
      width: 624px;          /* native GIF width -> crisp pixels on desktop */
      max-width: 92vw;       /* shrink gracefully on small screens */
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <img class="logo" src="nax_build.gif" alt="NAX" />
</body>
</html>
